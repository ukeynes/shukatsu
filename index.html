const list = document.getElementById('list');
const meta = document.getElementById('meta');
const searchEl = document.getElementById('search');

function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function highlight(text, kw){
  if(!kw)return esc(text);
  const re=new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

function render(query){
  const kw = query.trim();
  const filtered = kw ? DATA.filter(r=>
    r.q.includes(kw)||r.sub.includes(kw)||r.a.includes(kw)||r.memo.includes(kw)
  ) : DATA;
  meta.textContent = kw ? filtered.length+'件' : DATA.length+'問収録';
  if(!filtered.length){list.innerHTML='<div class=none>該当なし</div>';return;}
  list.innerHTML = filtered.map((r,i)=>{
    const hasSub = r.sub && r.sub!='None';
    const hasMemo= r.memo && r.memo!='None';
    return `<div class="card" onclick="this.classList.toggle('open')">
      <div class="head">
        <span class="badge ${r.type}">${r.type}</span>
        <div class="q">${highlight(r.q,kw)}</div>
      </div>
      <div class="body">
        ${hasSub?`<div class="sub">${highlight(r.sub,kw)}</div>`:''}
        <div class="ans">${esc(r.a)||'—'}</div>
        ${hasMemo?`<div class="memo">${highlight(r.memo,kw)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

const clearBtn = document.getElementById('clear-btn');
searchEl.addEventListener('input',e=>{
  clearBtn.style.display = e.target.value ? 'block' : 'none';
  render(e.target.value);
});
clearBtn.addEventListener('click',()=>{
  searchEl.value = '';
  clearBtn.style.display = 'none';
  searchEl.focus();
  render('');
});
render('');
</script>
